# VaultIQ — Production Environment

# Self-contained prod stack. No Ollama — uses OpenRouter API.
# Requires OPENROUTER_API_KEY in .env.prod.

# USAGE:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up --build

# DAILY DEV USAGE:
#   Start   : docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   Stop    : docker compose -f docker-compose.prod.yml down
#   Reset   : docker compose -f docker-compose.prod.yml down -v (wipes volumes)
#   Logs    : docker compose -f docker-compose.prod.yml logs -f

# ACCESS:
#   Frontend    : http://localhost:8501
#   Backend API : http://localhost:5000
#   Health      : http://localhost:5000/health
#   Health deep : http://localhost:5000/health/deep

# NOTE:
#   On Render, docker-compose is not used — Render builds directly from 
#   backend/Dockerfile and frontend/Dockerfile via render.yaml.
#   This file is for simulating the production environment locally before
#   deploying, so you can catch config issues without a Render redeploy.

services:

  # Backend (Flask API — prod settings)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vaultiq_backend_prod
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env.prod}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env.prod}
      HF_TOKEN: ${HF_TOKEN}

      # Prod LLM — OpenRouter API. No Ollama, no GPU needed.
      # 4-model fallback chain (gemma -> gpt-oss-120b -> gpt-oss-20b -> openrouter/free)
      # is handled automatically in llm_provider.py.
      LLM_PROVIDER: openrouter
      LLM_MODEL: ${LLM_MODEL:-google/gemma-4-31b-it:free}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY must be set in .env.prod}

      # Prod tuning:
      # - shorter timeout: API calls are fast(2-10s vs local 30-120s)
      # - 2 retries: handles transient API errors before falling back to next model
      # - stricter rate limit: to protect OpenRouter free-tier quota.(200 req/day)
      # - INFO logging: no debug noise in production logs
      LLM_TIMEOUT_SECONDS: 30
      LLM_MAX_RETRIES: 2
      ASK_RATE_LIMIT: 10 per minute
      LOG_LEVEL: INFO
      # Gunicorn worker timeout (gunicorn.conf.py reads this).
      # Worst case: 4-model fallback chiain x (LLM_MAX_RETRIES+1) attempts x LLM_TIMEOUT_SECONDS,
      # plus backoff delays, can approach ~300-370s if every model hits a transient (non-429) failure.
      # Set comfortably above that as a slow-but-successful fallback chain isn't killed mid-recovery.
      GUNICORN_TIMEOUT: 400
    volumes:
      # Named volume for persistent data (uploads, ChromaDB, and SQLite, logs)
      # _prod suffix keeps prod data fully separate from dev data.
      - backend_storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Prod: always restart on crash — no human watching the terminal.
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 2 gunicorn workers * ~180MB each + OS overhead ≈ 420MB.
          # Cap at 450MB to stay within Render free tier's 512MB RAM.
          memory: 450MB

  # frontend (Streamlit)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vaultiq_frontend_prod
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

# Named volumes
# _prod suffix keeps prod data fully separate from dev data.
# No ollama_models — prod uses OpenRouter, no local model storage needed.
volumes:
  backend_storage:
    name: vaultiq_backend_storage_prod
    
