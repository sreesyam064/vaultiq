[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = false

[browser]
# Disable usage telemetry sent to Streamlit's servers
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#7C3AED"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
