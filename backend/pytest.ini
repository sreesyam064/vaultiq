[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -v --tb=short

markers = 
    unit: Pure unit tests, no external dependencies (fast)
    integration: Real Chroma + fixture PDF, mocked llm
    routes: Flask test client route tests
    e2e: End-to-end tests hitting real LLM API (run manually only, never in CI)

# Suppress warnings from third-party libraries we cannot control.
# Our own DeprecationWarnings still surface normally.
filterwarnings = 
    ignore::DeprecationWarning:langchain_community
    ignore:.*langchain-community.*:DeprecationWarning
    ignore::UserWarning:chromadb
    ignore::DeprecationWarning:jwt
    ignore::sqlalchemy.exc.LegacyAPIWarning
    ignore::DeprecationWarning:sqlalchemy
    ignore::jwt.warnings.InsecureKeyLengthWarning
    ignore::UserWarning:jwt